name: Deploy Quartz site to GitHub Pages

on:
  # Runs on pushes targeting the main branch
  push:
    branches:
      - v4
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # Fetches all history for git-based features like last-modified
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Specify Node.js version required by Quartz

      - name: Install Dependencies
        run: npm ci # Use 'ci' for faster, more reliable installs in CI environments

      - name: Build Quartz Site
        run: npx quartz build

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public # The folder Quartz builds the site to

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build # This job depends on the 'build' job completing successfully
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
